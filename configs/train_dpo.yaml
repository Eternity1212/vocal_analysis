experiment:
  name: dpo_policy
  seed: 1314
  output_dir: outputs/dpo

data:
  train_jsonl: data/processed/dpo/train_dpo.jsonl
  val_jsonl: data/processed/dpo/val_dpo.jsonl
  batch_size: 4
  num_workers: 0

model:
  input_shape:
    - 1
    - 40
    - 128
  score_dims: 10
  num_classes: 5
  hidden_dim: 256
  dropout: 0.1

reference:
  checkpoint_path: models/reference/reference_model.pt

training:
  epochs: 3
  learning_rate: 0.0001
  weight_decay: 0.0001
  beta: 0.1
  device: auto
  checkpoint_name: policy_model_dpo.pt
