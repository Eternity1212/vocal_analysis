experiment:
  name: demo_reference
  seed: 1314
  output_dir: models/reference

data:
  train_jsonl: data/processed/dpo/train_dpo.jsonl
  val_jsonl: data/processed/dpo/val_dpo.jsonl
  batch_size: 4
  num_workers: 0

model:
  input_shape:
    - 1
    - 40
    - 128
  score_dims: 10
  num_classes: 5
  hidden_dim: 128
  dropout: 0.1

training:
  epochs: 2
  learning_rate: 0.001
  weight_decay: 0.0001
  device: auto
  checkpoint_name: reference_model.pt
